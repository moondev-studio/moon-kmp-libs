name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - '**/*.kt'
      - '**/build.gradle.kts'
      - 'libs.versions.toml'
      - '.github/workflows/**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      target:
        description: 'Publish target'
        required: true
        type: choice
        options:
          - github-packages
          - maven-central
          - all
        default: github-packages

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Library Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Stop Gradle Daemon
        run: ./gradlew --stop || true

      - name: Run All Library Tests
        run: ./gradlew desktopTest
        timeout-minutes: 25

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: '**/build/reports/tests/'
          retention-days: 7

  publish-github-packages:
    name: Publish to GitHub Packages
    permissions:
      contents: read
      packages: write
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'github-packages' || inputs.target == 'all'))
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from tag (v1.2.3 → 1.2.3)
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        run: >
          ./gradlew publishAllPublicationsToGitHubPackagesRepository
          -PVERSION_NAME=${{ steps.version.outputs.VERSION }}
          -PskipSigning=true
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_PAT: ${{ github.token }}

      - name: Notify Slack — GitHub Packages published
        if: success() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":package: *moon-kmp-libs ${{ steps.version.outputs.VERSION }}* published to GitHub Packages\nTriggered by: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — GitHub Packages failed
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *moon-kmp-libs* GitHub Packages publish *FAILED* (version: ${{ steps.version.outputs.VERSION }})\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  publish-maven-central:
    name: Publish to Maven Central
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'maven-central' || inputs.target == 'all'))
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Maven Central
        run: |
          ./gradlew publishAllPublicationsToMavenCentralRepository \
            -PVERSION_NAME=${{ steps.version.outputs.VERSION }} \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: A5B5E603
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Notify Slack — Maven Central published
        if: success() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *moon-kmp-libs ${{ steps.version.outputs.VERSION }}* published to Maven Central\nTriggered by: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — Maven Central failed
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *moon-kmp-libs* Maven Central publish *FAILED* (version: ${{ steps.version.outputs.VERSION }})\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
